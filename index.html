<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM Group</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

.topbar{
background:#1f4e79;
color:white;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:22px;
}

.sidebar{
position:fixed;
top:0;
left:-100%;
width:240px;
height:100%;
background:#1f4e79;
padding:15px;
transition:0.3s;
}

.sidebar.open{left:0;}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
background:rgba(255,255,255,0.1);
border:none;
color:white;
border-radius:8px;
}

.main{padding:15px;}

.screen{display:none}
.screen.active{display:block}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1f4e79;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleMenu()">☰</button>
<span>HM Group</span>
</div>

<div class="sidebar" id="sidebar">
<button onclick="go('stock')">Stock</button>
<button onclick="go('sortie')">Sorties</button>
<button onclick="go('achat')">Achats</button>
<button onclick="go('bl')">BL</button>
<button onclick="go('valo')">Valorisation</button>
</div>

<div class="main">

<div id="stock" class="screen active">
<div class="card">
<h3>Produits</h3>
<input id="productName">
<button onclick="addProduct()">Ajouter</button>
<ul id="productList"></ul>
</div>
</div>

<div id="sortie" class="screen">
<div class="card">
<h3>Sortie</h3>
<select id="productSelect"></select>
<input id="qty">
<button onclick="addSortie()">Valider</button>
</div>
</div>

<div id="achat" class="screen">
<div class="card">
<h3>Achat</h3>
<select id="achatProduct"></select>
<input id="achatQty">
<button onclick="addAchat()">Créer</button>
</div>
</div>

<div id="bl" class="screen">
<div class="card">
<h3>BL</h3>
<div id="blList"></div>
</div>
</div>

<div id="valo" class="screen">
<div class="card">
<h3>Valorisation</h3>
<div id="valoResult"></div>
</div>
</div>

</div>

<script>

let products = []
let movements = []
let bl = []

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.getElementById("sidebar").classList.remove("open")
}

function addProduct(){
let name=document.getElementById("productName").value
products.push({name})
renderProducts()
}

function renderProducts(){
let html=""
let opt=""

products.forEach((p,i)=>{
html+=`<li>${p.name}</li>`
opt+=`<option value="${i}">${p.name}</option>`
})

document.getElementById("productList").innerHTML=html
document.getElementById("productSelect").innerHTML=opt
document.getElementById("achatProduct").innerHTML=opt
}

function addAchat(){
let i=document.getElementById("achatProduct").value
let qty=document.getElementById("achatQty").value

movements.push({product:i,qty:parseInt(qty)})
}

function addSortie(){
let i=document.getElementById("productSelect").value
let qty=document.getElementById("qty").value

movements.push({product:i,qty:-parseInt(qty)})

bl.push("BL client")

renderBL()
}

function renderBL(){
let html=""
bl.forEach(b=>{
html+=`<div class="card">${b}</div>`
})
document.getElementById("blList").innerHTML=html
}

</script>

</body>
</html>
