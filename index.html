<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM Group</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

/* TOPBAR */
.topbar{
display:flex;
background:#1f4e79;
color:white;
padding:12px;
align-items:center;
justify-content:space-between;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

/* MENU */
.sidebar{
position:fixed;
top:0;
left:-100%;
width:240px;
height:100%;
background:#1f4e79;
padding:15px;
transition:0.3s;
z-index:1000;
}

.sidebar.open{left:0;}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:rgba(255,255,255,0.1);
border:none;
color:white;
border-radius:10px;
text-align:left;
}

/* MAIN */
.main{
padding:15px;
}

.screen{display:none}
.screen.active{display:block}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1f4e79;
color:white;
font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleMenu()">☰</button>
<span>HM Group</span>
</div>

<div class="sidebar" id="sidebar">
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('stock')">Stock</button>
<button onclick="go('sortie')">Sorties</button>
<button onclick="go('achat')">Achats</button>
<button onclick="go('bl')">BL</button>
<button onclick="go('valo')">Valorisation</button>
</div>

<div class="main">

<div id="dashboard" class="screen active">
<div class="card">Dashboard OK</div>
</div>

<div id="stock" class="screen">
<div class="card">
<h3>Produits</h3>
<input id="productName">
<button onclick="addProduct()">Ajouter</button>
<ul id="productList"></ul>
</div>
</div>

<div id="sortie" class="screen">
<div class="card">
<h3>Sortie</h3>
<select id="productSelect"></select>
<input id="qty">
<input id="price">
<button onclick="addSortie()">Valider</button>
</div>
</div>

<div id="achat" class="screen">
<div class="card">
<h3>Achat</h3>
<select id="achatProduct"></select>
<input id="achatQty">
<input id="achatPrice">
<button onclick="addAchat()">Créer</button>
</div>
</div>

<div id="bl" class="screen">
<div class="card">
<h3>BL</h3>
<div id="blList"></div>
</div>
</div>

<div id="valo" class="screen">
<div class="card">
<h3>Valorisation</h3>
<button onclick="calcValo()">Calculer</button>
<div id="valoResult"></div>
</div>
</div>

</div>

<!-- SUPABASE (CORRECT) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://siirathwhnbrnlpsrkifr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaXJhdHdobmJybmxwc3JraWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTU5NjYsImV4cCI6MjA5MjAzMTk2Nn0.f1wmZVst3Sh8CKgxpRxL3PrXpThXSk8vaQxlIXs6940";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.getElementById("sidebar").classList.remove("open")
}

/* PRODUITS */
async function addProduct(){
let name=document.getElementById("productName").value
await client.from("products").insert([{name}])
loadProducts()
}

async function loadProducts(){
let {data,error}=await client.from("products").select("*")
if(error){console.log(error);return;}

let html=""
let opt=""

data.forEach(p=>{
html+=`<li>${p.name}</li>`
opt+=`<option value="${p.id}">${p.name}</option>`
})

document.getElementById("productList").innerHTML=html
document.getElementById("productSelect").innerHTML=opt
document.getElementById("achatProduct").innerHTML=opt
}

/* ACHAT */
async function addAchat(){
await client.from("movements").insert([{
product_id:document.getElementById("achatProduct").value,
quantity:document.getElementById("achatQty").value,
type:"purchase",
price:document.getElementById("achatPrice").value
}])
}

/* SORTIE */
async function addSortie(){
await client.from("movements").insert([{
product_id:document.getElementById("productSelect").value,
quantity:-Math.abs(document.getElementById("qty").value),
type:"sortie",
price:document.getElementById("price").value
}])

await client.from("bl").insert([{}])

loadBL()
}

/* BL */
async function loadBL(){
let {data}=await client.from("bl").select("*")
let html=""
data.forEach(b=>{html+=`<div class="card">BL</div>`})
document.getElementById("blList").innerHTML=html
}

/* VALO */
async function calcValo(){
let {data}=await client.from("movements").select("*")
let total=0
data.forEach(m=>{total+=m.quantity*(m.price||0)})
document.getElementById("valoResult").innerHTML="Total "+total+"€"
}

/* INIT */
loadProducts()
loadBL()

</script>

</body>
</html>
